# ═══════════════════════════════════════════════════════
# Loot Tables — Weighted item pools for chests & drops
# Each table has: gold range, roll count, and a weighted pool.
# Optional: allowDuplicates (bool, default true).
#   - true: a multi-roll chest can pick the same pool item more than once.
#   - false: picks are unique per chest open.
# Stages can define their own tables in stage.yaml to
# override or extend these defaults.
# ═══════════════════════════════════════════════════════

# ── Tier 1: Early dungeon (levels 1-3) ──────────────
starter_common:
  gold: [4, 14]
  rolls: 1
  pool:
    - { id: potion_heal,    name: "Healing Potion",     weight: 34, icon: "🧪", type: consumable, heal: "2d4+2", rolls: 1 }
    - { id: ration,         name: "Rations (x3)",       weight: 24, icon: "🍖", type: misc, rolls: [3, 5] }
    - { id: torch_bundle,   name: "Torches (x5)",       weight: 18, icon: "🔥", type: misc, rolls: [5, 8] }
    - { id: arrow_bundle,   name: "Arrows (x10)",       weight: 14, icon: "🏹", type: misc, rolls: [8, 12] }
    - { id: gem_quartz,     name: "Quartz Gem",         weight: 6,  icon: "💎", type: gem, value: 10, rolls: 1 }
    - { id: antidote,       name: "Antidote",           weight: 4,  icon: "🧪", type: consumable, rolls: 1 }

starter_uncommon:
  gold: [10, 26]
  rolls: 2
  allowDuplicates: false
  pool:
    - { id: potion_heal,    name: "Healing Potion",     weight: 28, icon: "🧪", type: consumable, heal: "2d4+2", rolls: 1 }
    - { id: antidote,       name: "Antidote",           weight: 18, icon: "🧪", type: consumable, rolls: 1 }
    - { id: lockpick_set,   name: "Thieves' Tools",     weight: 16, icon: "🔧", type: misc, rolls: 1 }
    - { id: scroll_shield,  name: "Scroll of Shield",   weight: 12, icon: "📜", type: consumable, rolls: 1 }
    - { id: gem_amethyst,   name: "Amethyst",           weight: 10, icon: "💎", type: gem, value: 25, rolls: 1 }
    - { id: potion_str,     name: "Potion of Strength", weight: 10, icon: "🧪", type: consumable, rolls: 1 }
    - { id: dagger_plus1,   name: "Dagger +1",          weight: 6,  icon: "🗡️", type: weapon, weaponId: shortsword, atkBonus: 1, dmgBonus: 1, rolls: 1 }

# ── Tier 2: Mid dungeon (levels 4-6) ────────────────
dungeon_common:
  gold: [14, 36]
  rolls: 1
  pool:
    - { id: potion_heal,    name: "Healing Potion",             weight: 28, icon: "🧪", type: consumable, heal: "2d4+2", rolls: 1 }
    - { id: potion_heal_greater, name: "Greater Healing Potion", weight: 22, icon: "🧪", type: consumable, heal: "4d4+4", rolls: 1 }
    - { id: arrow_fire,     name: "Fire Arrows (x5)",           weight: 16, icon: "🏹", type: misc, rolls: [5, 8] }
    - { id: potion_invis,   name: "Potion of Invisibility",     weight: 14, icon: "🧪", type: consumable, rolls: 1 }
    - { id: gem_ruby,       name: "Ruby",                       weight: 12, icon: "💎", type: gem, value: 50, rolls: 1 }
    - { id: scroll_fireball, name: "Scroll of Fireball",        weight: 8,  icon: "📜", type: consumable, rolls: 1 }

dungeon_uncommon:
  gold: [24, 56]
  rolls: 2
  allowDuplicates: false
  pool:
    - { id: potion_heal_greater, name: "Greater Healing Potion", weight: 22, icon: "🧪", type: consumable, heal: "4d4+4", rolls: 1 }
    - { id: lockpick_set,   name: "Thieves' Tools",             weight: 16, icon: "🔧", type: misc, rolls: 1 }
    - { id: potion_resist_fire, name: "Potion of Fire Resistance", weight: 15, icon: "🧪", type: consumable, rolls: 1 }
    - { id: potion_invis,   name: "Potion of Invisibility",     weight: 14, icon: "🧪", type: consumable, rolls: 1 }
    - { id: scroll_misty_step, name: "Scroll of Misty Step",    weight: 12, icon: "📜", type: consumable, rolls: 1 }
    - { id: gem_sapphire,   name: "Sapphire",                   weight: 10, icon: "💎", type: gem, value: 75, rolls: 1 }
    - { id: shortsword_plus1, name: "Shortsword +1",            weight: 7,  icon: "🗡️", type: weapon, weaponId: shortsword, atkBonus: 1, dmgBonus: 1, rolls: 1 }
    - { id: shield_plus1,   name: "Shield +1",                  weight: 6,  icon: "🛡️", type: armor, acBonus: 1, rolls: 1 }
    - { id: ring_protection, name: "Ring of Protection",        weight: 3,  icon: "💍", type: armor, acBonus: 1, rolls: 1 }

# ── Tier 3: Deep dungeon (levels 7+) ────────────────
dungeon_rare:
  gold: [45, 95]
  rolls: 2
  allowDuplicates: false
  pool:
    - { id: potion_heal_greater, name: "Greater Healing Potion", weight: 20, icon: "🧪", type: consumable, heal: "4d4+4", rolls: 1 }
    - { id: potion_heal_superior, name: "Superior Healing Potion", weight: 14, icon: "🧪", type: consumable, heal: "8d4+8", rolls: 1 }
    - { id: scroll_lightning, name: "Scroll of Lightning Bolt",    weight: 12, icon: "📜", type: consumable, rolls: 1 }
    - { id: gem_emerald,     name: "Emerald",                      weight: 12, icon: "💎", type: gem, value: 100, rolls: 1 }
    - { id: potion_fly,      name: "Potion of Flying",             weight: 11, icon: "🧪", type: consumable, rolls: 1 }
    - { id: arrow_fire,      name: "Fire Arrows (x5)",             weight: 10, icon: "🏹", type: misc, rolls: [5, 10] }
    - { id: longsword_plus2, name: "Longsword +2",                 weight: 7,  icon: "🗡️", type: weapon, weaponId: longsword, atkBonus: 2, dmgBonus: 2, rolls: 1 }
    - { id: gem_diamond,     name: "Diamond",                      weight: 6,  icon: "💎", type: gem, value: 150, rolls: 1 }
    - { id: ring_resistance, name: "Ring of Resistance",           weight: 5,  icon: "💍", type: misc, rolls: 1 }
    - { id: amulet_health,   name: "Amulet of Health",             weight: 2,  icon: "📿", type: misc, rolls: 1 }

# ── Empty/Trap chests ───────────────────────────────
empty:
  gold: [0, 0]
  rolls: 0
  pool: []

trap_only:
  gold: [0, 5]
  rolls: 0
  pool: []
