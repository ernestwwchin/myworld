# Core sprite manifest — loaded by sprites.js manager
# Modders rarely need to touch this unless adding new creature types or custom art.

spriteManifest:
  atlases:
    - key: 0x72
      image: assets/vendor/0x72_dungeon/0x72_DungeonTilesetII_v1.7/0x72_DungeonTilesetII_v1.7.png
      json: assets/vendor/0x72_dungeon/0x72_dungeon.json

  tiles:
    t_floor:      { atlas: 0x72, frame: floor_1 }
    t_floor_2:    { atlas: 0x72, frame: floor_2 }
    t_floor_3:    { atlas: 0x72, frame: floor_3 }
    t_floor_4:    { atlas: 0x72, frame: floor_4 }
    t_wall:       { atlas: 0x72, frame: wall_mid }
    t_wall_left:  { atlas: 0x72, frame: wall_left }
    t_wall_right: { atlas: 0x72, frame: wall_right }
    t_wall_top:   { atlas: 0x72, frame: wall_top_mid }
    t_door:       { atlas: 0x72, frame: doors_leaf_closed }
    t_door_open:  { atlas: 0x72, frame: doors_leaf_open }
    t_chest:      { atlas: 0x72, frame: chest_full_open_anim_f0 }
    t_chest_open: { atlas: 0x72, frame: chest_empty_open_anim_f2 }
    t_stairs:     { atlas: 0x72, frame: floor_stairs }
    t_water:      { atlas: 0x72, frame: floor_1 }
    t_grass:      { atlas: 0x72, frame: floor_4 }
    deco_torch:   { atlas: 0x72, frame: wall_fountain_mid_red_anim_f0 }
    deco_column:  { atlas: 0x72, frame: column }
    deco_crate:   { atlas: 0x72, frame: crate }
    deco_skull:   { atlas: 0x72, frame: skull }

  characters:
    player:
      atlas: 0x72
      idle: [elf_m_idle_anim_f0, elf_m_idle_anim_f1, elf_m_idle_anim_f2, elf_m_idle_anim_f3]
      run:  [elf_m_run_anim_f0,  elf_m_run_anim_f1,  elf_m_run_anim_f2,  elf_m_run_anim_f3]
      hit:  [elf_m_hit_anim_f0]
    goblin:
      atlas: 0x72
      idle: [goblin_idle_anim_f0, goblin_idle_anim_f1, goblin_idle_anim_f2, goblin_idle_anim_f3]
      run:  [goblin_run_anim_f0,  goblin_run_anim_f1,  goblin_run_anim_f2,  goblin_run_anim_f3]
    skeleton:
      atlas: 0x72
      idle: [skelet_idle_anim_f0, skelet_idle_anim_f1, skelet_idle_anim_f2, skelet_idle_anim_f3]
      run:  [skelet_run_anim_f0,  skelet_run_anim_f1,  skelet_run_anim_f2,  skelet_run_anim_f3]
    orc:
