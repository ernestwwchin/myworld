# Core module metadata
# Core is the mandatory base mod — always loaded first, cannot be disabled.
# It defines shared rules, base creature stat blocks, weapons, abilities, etc.
# Content mods (goblin_invasion, etc.) layer on top and declare their own startMap.

id: core
name: Core
author: MyWorld
version: 1.0.0
description: Base game rules, creatures, weapons, abilities, and classes.
enabled: true

# No startMap — core does not decide the opening stage.
# Test stages live in data/test/ (separate disabled mod).

includes:
  - rules.yaml
  - abilities.yaml
  - statuses.yaml
  - classes.yaml
  - weapons.yaml
  - creatures.yaml
