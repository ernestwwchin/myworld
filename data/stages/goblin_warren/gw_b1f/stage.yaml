# B1F — The Warren Gate
# Floor: Basement 1st Floor — Full Goblin Base (56×36)
# Loaded preferentially by modloader when activeMap: gw_b1f

name: "B1F — The Warren Gate"
floor: B1F
globalLight: dark

lights:
