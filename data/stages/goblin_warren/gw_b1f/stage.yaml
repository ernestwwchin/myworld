playerStart: { x: 2, y: 2 }

encounters:
  # Entry patrol — timing-based stealth challenge
  - creature: goblin
    x: 8
    y: 2
    facing: 0
    group: entry_patrol
    ai:
      patrolPath:
        - { x: 8,  y: 2 }
        - { x: 18, y: 2 }

  - creature: goblin
    x: 18
    y: 4
    facing: 180
    group: entry_patrol
    ai:
      patrolPath:
        - { x: 18, y: 4 }
        - { x: 8,  y: 4 }

  # Barracks patrol — loops the barracks area
  - creature: goblin
    x: 5
    y: 6
    facing: 0
    group: barracks
    ai:
      patrolPath:
        - { x: 3,  y: 6 }
        - { x: 18, y: 6 }
        - { x: 18, y: 12 }
        - { x: 3,  y: 12 }

  - creature: goblin
    x: 15
    y: 11
    facing: 180
    group: barracks
    ai:
      patrolPath:
        - { x: 15, y: 9 }
        - { x: 8,  y: 9 }
        - { x: 8,  y: 12 }
        - { x: 15, y: 12 }

  # Main corridor patrol — well-lit danger zone
  - creature: goblin
    x: 27
    y: 14
    facing: 0
    group: corridor_patrol
    ai:
      patrolPath:
        - { x: 2,  y: 14 }
        - { x: 52, y: 14 }
        - { x: 52, y: 13 }
        - { x: 2,  y: 13 }

  # Storage guard — stationary
  - creature: goblin
    x: 30
    y: 9
    facing: 270
    group: ~

  # East guard post patrol
  - creature: goblin
    x: 40
    y: 4
    facing: 180
    group: east_guards
    ai:
      patrolPath:
        - { x: 38, y: 3 }
        - { x: 52, y: 3 }

  - creature: goblin
    x: 50
    y: 11
    facing: 90
    group: east_guards
    ai:
      patrolPath:
        - { x: 52, y: 11 }
        - { x: 38, y: 11 }

  # Prison corridor patrol
  - creature: goblin
    x: 10
    y: 20
    facing: 0
    group: ~
    ai:
      patrolPath:
        - { x: 8,  y: 16 }
        - { x: 17, y: 16 }
        - { x: 17, y: 24 }
        - { x: 8,  y: 24 }

  # Captain's chamber — patrol + heavy guard
  - creature: goblin_captain
    x: 28
    y: 17
    facing: 180
    group: captain_detail
    ai:
      patrolPath:
        - { x: 21, y: 16 }
        - { x: 35, y: 16 }
        - { x: 35, y: 24 }
        - { x: 21, y: 24 }

  - creature: orc
    x: 33
    y: 23
    facing: 90
    group: captain_detail

  # Ritual study — shaman, stationary
  - creature: goblin_shaman
    x: 45
    y: 21
    facing: 270
    group: ~

  # Descent chamber — skeleton guardian
  - creature: skeleton
    x: 36
    y: 30
    facing: 90
    group: ~

