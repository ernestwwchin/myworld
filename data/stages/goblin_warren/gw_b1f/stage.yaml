  - { x: 10, y: 2,  radius: 5, level: bright }
  # Barracks — dim, goblins sleep
  - { x: 12, y: 7,  radius: 4, level: dim }
  # Storage
  - { x: 28, y: 6,  radius: 3, level: dim }
  # East guard post
  - { x: 42, y: 4,  radius: 4, level: dim }
  - { x: 50, y: 10, radius: 3, level: dim }
  # Main corridor — well-lit, DANGER ZONE for stealth
  - { x: 12, y: 13, radius: 5, level: bright }
  - { x: 38, y: 13, radius: 5, level: bright }
  # Prison — dim, eerie
  - { x: 12, y: 19, radius: 3, level: dim }
  # Captain's chamber — brightly lit
  - { x: 30, y: 17, radius: 5, level: bright }
  # Ritual study — eerie dim
  - { x: 42, y: 16, radius: 3, level: dim }
  # Water pool glow
  - { x: 46, y: 19, radius: 2, level: dim }
  # Lower corridor — dramatic
  - { x: 26, y: 25, radius: 4, level: bright }
  # Descent chamber — ominous
  - { x: 36, y: 30, radius: 4, level: bright }

