# Test: Fog of War & Lighting
# A 30x30 map with narrow corridors, rooms, and torches.
# Use to visually verify:
#   - Smooth radial gradient around player (no tile-stepping)
#   - LOS shadows behind pillars and walls
#   - Torch light brightening explored tiles
#   - No brightness inversion at vision boundary
#   - Explored↔unexplored boundary smoothness

name: "Test: Fog & Lighting"
floor: FOG
globalLight: dark

lights:
  # Starting room torch
  - { x: 3,  y: 3,  radius: 3, level: bright }
  # Corridor torch
  - { x: 8,  y: 5,  radius: 2, level: dim }
  # Large room torches
  - { x: 18, y: 8,  radius: 4, level: bright }
  - { x: 25, y: 12, radius: 3, level: dim }
  # South corridor
  - { x: 5,  y: 20, radius: 3, level: dim }
  # SE room
  - { x: 22, y: 24, radius: 4, level: bright }
  # Far NE corner
  - { x: 27, y: 3,  radius: 3, level: dim }

