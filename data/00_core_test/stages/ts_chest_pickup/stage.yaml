# Test: Chest Pickup
# Player can open chest and pickup healing potion.

name: "Test: Chest Pickup"
floor: TE
globalLight: bright

grid:
  - "#####"
  - "#...#"
  - "#.C.#"
  - "#...#"
  - "#####"

playerStart: { x: 2, y: 1 }
encounters: []

interactables:
  - id: chest_test_pickup
    kind: chest
    x: 2
    y: 2
    open: false
    loot:
      -
        id: potion_heal
        name: Healing Potion
        type: consumable
        icon: P
        onUse:
          effects:
            - { type: heal, amount: "2d4+2" }
    gold: 0
