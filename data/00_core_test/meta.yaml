# Core test mod — automated test stages for core game mechanics.
# Disabled by default so test stages never load during normal gameplay.
# The test runner (tests/run-tests.js) reads these files directly by path.

id: 00_core_test
name: Core Tests
author: MyWorld
version: 1.0.0
description: Automated test stages for the test runner.
enabled: false

includes:
  - loot-tables.yaml

stages:
  - ts_combat_entry
  - ts_combat_join_reasons
  - ts_combat_reset
  - ts_enemy_attack
  - ts_fog
  - ts_level_up
  - ts_melee_attack
  - ts_movement
  - ts_floor_transition_a
  - ts_floor_transition_b
  - ts_skills
  - ts_chest_pickup
  - ts_potion_heal
  - ts_chest_loot
