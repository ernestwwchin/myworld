# Goblin Invasion — content mod
# Adds the goblin warren dungeon: creatures, stages, and items
# specific to the goblin invasion story arc.

id: 01_goblin_invasion
name: "Dungeon Campaign (World 1: Goblin Warren)"
author: MyWorld
version: 1.0.0
description: Town hub + world-run campaign. World 1 is the goblin warren descent.
enabled: true

startMap: town_hub

includes:
  - creatures.yaml
  - worlds.yaml

stages:
  - town_hub
  - gw_b1f
  - gw_cave_b1f
  - gw_b2f
  - gw_b3f
  - gw_b4f
  - gw_b5f

flags:
  entered_warren: { type: bool, default: false }
  goblin_captain_dead: { type: bool, default: false }
  goblins_killed: { type: counter, default: 0 }
