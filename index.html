<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RPG</title>
<style>
/* ═══════════════════════════════════════════════════════
   style.css — All UI styles
═══════════════════════════════════════════════════════ */


*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;}
#gc{position:relative;width:100vw;height:100vh;}
#gc canvas{display:block;}
/* UI wrapper — overlays constrained to game area */
#ui-overlay{position:absolute;top:0;left:0;pointer-events:none;z-index:5;overflow:hidden;}
#ui-overlay > *{pointer-events:auto;}

#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;background:linear-gradient(to bottom,rgba(0,0,0,0.88),transparent);pointer-events:none;z-index:10;}
#hud-left{display:flex;flex-direction:column;gap:3px;}
.hl{color:#c9a84c;font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:0.7;}
.hv{color:#f0e6c8;font-size:16px;letter-spacing:1px;}
#hp-wrap{width:160px;height:10px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin-top:2px;}
#hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#c0392b,#e74c3c);border-radius:4px;transition:width 0.4s;}
#hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}

#mode-banner{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:50;opacity:0;transition:opacity 0.3s;}
#mode-banner.show{opacity:1;}
#mode-banner-text{font-size:28px;letter-spacing:8px;font-weight:bold;padding:10px 32px;border-radius:4px;text-shadow:0 0 20px currentColor;}
#mode-banner.combat #mode-banner-text{color:#e74c3c;border:2px solid rgba(231,76,60,0.6);background:rgba(231,76,60,0.12);}
#mode-banner.explore #mode-banner-text{color:#2ecc71;border:2px solid rgba(46,204,113,0.6);background:rgba(46,204,113,0.12);}

#mode-badge{position:absolute;top:72px;left:8px;transform:none;font-size:11px;letter-spacing:3px;padding:4px 14px;border-radius:20px;pointer-events:none;z-index:10;transition:all 0.3s;}
#mode-badge.realtime{background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.4);color:#2ecc71;}
#mode-badge.turnbased{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.5);color:#e74c3c;}

#init-bar{position:absolute;top:50%;right:8px;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.4s;}
#init-bar.show{opacity:1;}
.ip{width:48px;height:48px;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;letter-spacing:1px;gap:2px;border:2px solid transparent;transition:all 0.3s;}
.ip.active{border-color:#f0c060;box-shadow:0 0 10px rgba(240,192,96,0.6);transform:scale(1.15);}
.ip.pp{background:rgba(41,128,185,0.4);color:#7fc8f8;}
.ip.ep{background:rgba(180,30,30,0.4);color:#f08080;}
.ip-icon{font-size:22px;line-height:1;}

/* Resource bar */
/* ── Compact combat bar — single row at bottom ── */
#res-bar{
  position:absolute;bottom:42px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;
  opacity:0;pointer-events:none;z-index:10;transition:opacity 0.3s;
  background:rgba(0,0,0,0.82);border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;padding:4px 12px;
}
#res-bar.show{opacity:1;}
.res-item{display:flex;align-items:center;gap:4px;}
.res-icon{font-size:15px;line-height:1;}
.res-val{font-size:12px;letter-spacing:1px;font-family:'Courier New',monospace;}
.res-val.ok{color:#64b5f6;}
.res-val.spent{color:#546e7a;}
.res-val.aok{color:#a5d6a7;}
.res-val.aused{color:#546e7a;}
.res-sep{width:1px;height:16px;background:rgba(255,255,255,0.15);}

/* Action bar — compact horizontal */
#action-bar{
  position:absolute;bottom:82px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;
  opacity:0;pointer-events:none;z-index:10;transition:opacity 0.3s;
}
#action-bar.show{opacity:1;pointer-events:all;}
.ab{
  padding:8px 14px;border-radius:4px;font-size:11px;letter-spacing:1px;
  font-family:'Courier New',monospace;cursor:pointer;border:none;
  transition:all 0.2s;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-width:64px;
}
.ab-cost{font-size:9px;opacity:0.55;letter-spacing:0px;}
.ab:active{transform:scale(0.95);}
#btn-atk{background:rgba(192,57,43,0.85);color:#f0e6c8;border:1px solid rgba(231,76,60,0.5);}
#btn-atk:hover{background:rgba(231,76,60,0.95);}
#btn-atk.used{opacity:0.3;pointer-events:none;}
#btn-dash{background:rgba(41,128,185,0.8);color:#f0e6c8;border:1px solid rgba(52,152,219,0.4);}
#btn-dash:hover{background:rgba(52,152,219,0.95);}
#btn-dash.used{opacity:0.3;pointer-events:none;}
#btn-flee{background:rgba(46,204,113,0.75);color:#f0e6c8;border:1px solid rgba(46,204,113,0.45);}
#btn-flee:hover{background:rgba(46,204,113,0.95);}
#btn-flee.used{opacity:0.3;pointer-events:none;}
#btn-hide{background:rgba(52,152,219,0.75);color:#f0e6c8;border:1px solid rgba(52,152,219,0.45);}
#btn-hide:hover{background:rgba(52,152,219,0.95);}
#btn-hide.used{opacity:0.3;pointer-events:none;}
#btn-sleep{background:rgba(123,104,238,0.78);color:#f0e6c8;border:1px solid rgba(123,104,238,0.45);}
#btn-sleep:hover{background:rgba(147,112,219,0.95);}
#btn-sleep.used{opacity:0.3;pointer-events:none;}
#btn-rmove{background:rgba(80,60,130,0.8);color:#f0e6c8;border:1px solid rgba(120,100,180,0.4);}
#btn-rmove:hover{background:rgba(120,100,180,0.95);}
#btn-end{background:rgba(52,73,94,0.85);color:#aaa;border:1px solid rgba(127,140,141,0.3);}
#btn-end:hover{background:rgba(74,96,119,0.95);color:#f0e6c8;}
.ab.selected{box-shadow:0 0 8px currentColor;transform:scale(1.05);}

/* Explore hotbar — persistent bottom bar (BG3-style) */
#explore-bar{
  position:absolute;bottom:42px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;
  opacity:1;pointer-events:all;z-index:10;transition:opacity 0.3s;
}
#explore-bar.hidden{opacity:0;pointer-events:none;}
.eb{
  padding:8px 14px;border-radius:4px;font-size:11px;letter-spacing:1px;
  font-family:'Courier New',monospace;cursor:pointer;border:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-width:64px;transition:all 0.2s;
}
.eb-hint{font-size:9px;opacity:0.45;letter-spacing:0px;}
.eb:active{transform:scale(0.95);}
#btn-explore-hide{background:rgba(52,152,219,0.75);color:#f0e6c8;border:1px solid rgba(52,152,219,0.45);}
#btn-explore-hide:hover{background:rgba(52,152,219,0.95);}
#btn-explore-hide.active{background:rgba(52,152,219,0.95);box-shadow:0 0 8px rgba(52,152,219,0.7);}
#btn-explore-sight{background:rgba(127,140,141,0.5);color:#b7c6cc;border:1px solid rgba(127,140,141,0.35);}
#btn-explore-sight:hover{background:rgba(127,140,141,0.7);}
#btn-explore-sight.off{background:rgba(70,70,70,0.35);border-color:rgba(90,90,90,0.35);color:#7f8c8d;}
#btn-explore-tb{background:rgba(127,140,141,0.5);color:#b7c6cc;border:1px solid rgba(127,140,141,0.35);}
#btn-explore-tb:hover{background:rgba(127,140,141,0.7);}
#btn-explore-tb.off{background:rgba(70,70,70,0.35);border-color:rgba(90,90,90,0.35);color:#7f8c8d;}
#btn-explore-stats{background:rgba(192,150,50,0.35);color:#c9a84c;border:1px solid rgba(192,150,50,0.35);}
#btn-explore-stats:hover{background:rgba(192,150,50,0.55);}

#status-bar{position:absolute;bottom:0;left:0;right:0;padding:4px 16px;text-align:center;background:rgba(0,0,0,0.7);color:#7a9e7e;font-size:12px;letter-spacing:1px;pointer-events:none;z-index:10;height:38px;display:flex;align-items:center;justify-content:center;}
#vignette{position:absolute;inset:0;pointer-events:none;z-index:8;box-shadow:inset 0 0 0px rgba(231,76,60,0);transition:box-shadow 0.4s;}
#enemy-stat-popup{display:none;position:absolute;z-index:30;background:rgba(10,10,20,0.97);border:1px solid rgba(231,76,60,0.5);border-radius:8px;padding:14px 16px;font-family:'Courier New',monospace;font-size:12px;color:#f0e6c8;min-width:200px;pointer-events:all;}
#esp-name{color:#e74c3c;letter-spacing:2px;font-size:14px;margin-bottom:8px;}
#vignette.combat{box-shadow:inset 0 0 80px rgba(231,76,60,0.35);}

/* Dice overlay */
#dice-ov{position:absolute;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);opacity:0;transition:opacity 0.2s;cursor:pointer;pointer-events:none;}
#dice-ov.show{opacity:1;pointer-events:all;}
#dice-stage{display:flex;gap:16px;align-items:center;justify-content:center;margin-bottom:16px;min-height:80px;}
.die-wrap{perspective:300px;width:64px;height:64px;position:relative;}
.die-box{width:64px;height:64px;transform-style:preserve-3d;position:relative;}
.die-box.rolling{animation:dieRoll 0.7s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
.die-box.landing{animation:dieLand 0.18s ease-out forwards;}
@keyframes dieRoll{0%{transform:rotateX(0)rotateY(0)rotateZ(0);}20%{transform:rotateX(180deg)rotateY(90deg)rotateZ(45deg);}50%{transform:rotateX(360deg)rotateY(270deg)rotateZ(180deg);}80%{transform:rotateX(540deg)rotateY(450deg)rotateZ(270deg);}100%{transform:rotateX(var(--rx))rotateY(var(--ry))rotateZ(0);}}
@keyframes dieLand{0%{transform:rotateX(var(--rx))rotateY(var(--ry))scale(1.15);}60%{transform:rotateX(var(--rx))rotateY(var(--ry))scale(0.92);}100%{transform:rotateX(var(--rx))rotateY(var(--ry))scale(1);}}
.die-face{position:absolute;width:64px;height:64px;border-radius:8px;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;font-family:'Courier New',monospace;backface-visibility:hidden;}
.die-face.f1{background:rgba(30,30,55,0.95);transform:translateZ(32px);}
.die-face.f2{background:rgba(25,25,50,0.95);transform:rotateY(180deg)translateZ(32px);}
.die-face.f3{background:rgba(28,28,52,0.95);transform:rotateY(90deg)translateZ(32px);}
.die-face.f4{background:rgba(28,28,52,0.95);transform:rotateY(-90deg)translateZ(32px);}
.die-face.f5{background:rgba(26,26,50,0.95);transform:rotateX(90deg)translateZ(32px);}
.die-face.f6{background:rgba(26,26,50,0.95);transform:rotateX(-90deg)translateZ(32px);}
/* Per-die-type colors */
.die-wrap.d20 .die-face{border-color:rgba(240,192,96,0.4);}
.die-wrap.d20 .die-face.f1{background:rgba(40,30,10,0.95);}
.die-wrap.d4{width:48px;height:48px;}.die-wrap.d4 .die-box{width:48px;height:48px;}
.die-wrap.d4 .die-face{width:48px;height:48px;border-color:rgba(46,204,113,0.4);border-radius:4px 4px 16px 16px;}
.die-wrap.d4 .die-face.f1{background:rgba(10,40,20,0.95);}
.die-wrap.d6 .die-face{border-color:rgba(52,152,219,0.4);}
.die-wrap.d6 .die-face.f1{background:rgba(10,20,40,0.95);}
.die-wrap.d8{width:56px;height:56px;}.die-wrap.d8 .die-box{width:56px;height:56px;}
.die-wrap.d8 .die-face{width:56px;height:56px;border-color:rgba(155,89,182,0.4);}
.die-wrap.d8 .die-face.f1{background:rgba(30,15,40,0.95);}
.die-wrap.d10{width:56px;height:56px;}.die-wrap.d10 .die-box{width:56px;height:56px;}
.die-wrap.d10 .die-face{width:56px;height:56px;border-color:rgba(231,76,60,0.4);}
.die-wrap.d10 .die-face.f1{background:rgba(40,10,10,0.95);}
.die-wrap.d12{width:60px;height:60px;}.die-wrap.d12 .die-box{width:60px;height:60px;}
.die-wrap.d12 .die-face{width:60px;height:60px;border-color:rgba(230,126,34,0.4);}
.die-wrap.d12 .die-face.f1{background:rgba(40,20,5,0.95);}
.die-wrap.crit .die-face{border-color:rgba(243,156,18,0.8);box-shadow:0 0 12px rgba(243,156,18,0.5);}
.die-type-badge{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:1px;color:rgba(255,255,255,0.4);font-family:'Courier New',monospace;white-space:nowrap;}
#dice-rl{font-family:'Courier New',monospace;font-size:13px;letter-spacing:2px;color:#f0e6c8;text-align:center;margin-bottom:6px;opacity:0;transition:opacity 0.3s 0.5s;}
#dice-rl.show{opacity:1;}
#dice-dl{font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;color:#aaa;text-align:center;opacity:0;transition:opacity 0.3s 0.65s;}
#dice-dl.show{opacity:1;}
#dice-out{font-family:'Courier New',monospace;font-size:18px;font-weight:bold;letter-spacing:4px;margin-top:8px;text-align:center;opacity:0;transition:opacity 0.3s 0.8s;text-shadow:0 0 20px currentColor;}
#dice-out.show{opacity:1;}
#dice-out.hit{color:#2ecc71;}
#dice-out.miss{color:#e74c3c;}
#dice-out.crit{color:#f39c12;}
#dice-cont{font-family:'Courier New',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:14px;text-align:center;opacity:0;transition:opacity 0.4s 1.2s;animation:blip 1.2s ease-in-out 1.5s infinite;}
#dice-cont.show{opacity:1;}
@keyframes blip{0%,100%{opacity:0.35;}50%{opacity:0.85;}}
.dice-sep{width:2px;height:48px;background:rgba(255,255,255,0.15);border-radius:1px;margin:0 6px;align-self:center;}
.dice-group{display:flex;align-items:center;gap:8px;}
.dice-label{font-family:'Courier New',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;position:absolute;top:-14px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.dice-group-wrap{position:relative;display:flex;align-items:center;gap:8px;}

/* Stats panel */
/* Old top-right utility buttons — hidden, replaced by explore hotbar */
#stats-btn,#sight-btn,#tb-btn{display:none!important;}
#stats-panel{position:absolute;top:0;right:0;width:260px;height:100%;background:rgba(8,8,18,0.98);border-left:1px solid rgba(192,150,50,0.3);z-index:20;padding:14px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s;font-size:11px;color:#f0e6c8;}
#stats-panel.open{transform:translateX(0);}
.sr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.sn{color:#c9a84c;letter-spacing:1px;}
.sv{color:#f0e6c8;}
.sm{color:#7fc8f8;font-size:10px;}
.ss{color:#c9a84c;letter-spacing:2px;font-size:10px;margin:10px 0 4px;border-bottom:1px solid rgba(192,150,50,0.3);padding-bottom:3px;}
.xw{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px;}
.xb{height:100%;background:#9b59b6;border-radius:2px;transition:width 0.5s;}
/* Skill rows */
.sk-row .sn{font-size:10px;}
.sk-row .sv{color:#7fc8f8;min-width:28px;text-align:right;}

/* ASI panel */
#asi-panel{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:60;align-items:center;justify-content:center;}

</style>
</head>
<body>
<div id="gc">
<div id="ui-overlay">
<div id="hud">
  <div id="hud-left">
    <span class="hl">Adventurer</span>
    <div id="hp-wrap"><div id="hp-bar"></div></div>
    <span class="hl">HP <span id="hp-text" style="color:#f0e6c8">12/12</span></span>
  </div>
  <div id="hud-right">
    <span class="hl">Floor</span><span class="hv">B1F</span>
    <span class="hl" style="margin-top:4px">Pos</span><span class="hv" id="pos-text">—</span>
  </div>
</div>
<div id="mode-badge" class="realtime">EXPLORE</div>
<div id="mode-banner"><div id="mode-banner-text"></div></div>
<div id="init-bar"></div>
<div id="res-bar">
  <div class="res-item"><div class="res-icon">🦶</div><div class="res-val ok" id="mv-val">6</div></div>
  <div class="res-sep"></div>
  <div class="res-item"><div class="res-icon">⚔️</div><div class="res-val aok" id="ac-val">ACT</div></div>
</div>
<div id="explore-bar">
  <button class="eb" id="btn-explore-hide"><span>🕶 Hide</span><span class="eb-hint">Stealth</span></button>
  <button class="eb" id="btn-explore-sight"><span>👁 Sight</span><span class="eb-hint">Toggle</span></button>
  <button class="eb" id="btn-explore-tb"><span>⏱ TB</span><span class="eb-hint">Mode</span></button>
  <button class="eb" id="btn-explore-stats"><span>📊 Stats</span><span class="eb-hint">View</span></button>
</div>
<div id="action-bar">
  <button class="ab" id="btn-atk"><span>⚔ Attack</span><span class="ab-cost">1 Action</span></button>
  <button class="ab" id="btn-dash"><span>💨 Dash</span><span class="ab-cost">1 Action</span></button>
  <button class="ab" id="btn-sleep"><span>🌫 Sleep</span><span class="ab-cost">1 Action</span></button>
  <button class="ab" id="btn-hide"><span>🕶 Hide</span><span class="ab-cost">1 Action</span></button>
  <button class="ab" id="btn-flee"><span>🏳 Flee</span><span class="ab-cost">1 Action</span></button>
  <button class="ab" id="btn-rmove"><span>↺ Reset</span><span class="ab-cost">Undo move</span></button>
  <button class="ab" id="btn-end"><span>⏳ End</span><span class="ab-cost">Pass</span></button>
</div>
<button id="stats-btn" onclick="toggleStats()">📊 STATS</button>
<button id="sight-btn" onclick="toggleEnemySight()">👁 SIGHT ON</button>
<button id="tb-btn" class="off" onclick="toggleExploreTurnBased()">⏱ TB OFF</button>
<div id="stats-panel"></div>
<div id="asi-panel">
  <div style="background:#0e0e1a;border:1px solid rgba(240,192,96,0.5);border-radius:8px;padding:20px;max-width:300px;width:90%;font-family:'Courier New',monospace;">
    <div id="asi-title" style="color:#f0c060;letter-spacing:2px;font-size:12px;margin-bottom:12px;text-align:center"></div>
    <div style="color:#aaa;font-size:10px;text-align:center;margin-bottom:14px">Choose 2 stats to increase by +1</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
      <button onclick="selectASI('str')" id="asi-str" style="padding:8px;background:rgba(192,150,50,0.1);border:1px solid rgba(192,150,50,0.3);color:#f0e6c8;font-family:'Courier New',monospace;font-size:11px;border-radius:4px;cursor:pointer">STR</button>
      <button onclick="selectASI('dex')" id="asi-dex" style="padding:8px;background:rgba(192,150,50,0.1);border:1px solid rgba(192,150,50,0.3);color:#f0e6c8;font-family:'Courier New',monospace;font-size:11px;border-radius:4px;cursor:pointer">DEX</button>
      <button onclick="selectASI('con')" id="asi-con" style="padding:8px;background:rgba(192,150,50,0.1);border:1px solid rgba(192,150,50,0.3);color:#f0e6c8;font-family:'Courier New',monospace;font-size:11px;border-radius:4px;cursor:pointer">CON</button>
      <button onclick="selectASI('int')" id="asi-int" style="padding:8px;background:rgba(192,150,50,0.1);border:1px solid rgba(192,150,50,0.3);color:#f0e6c8;font-family:'Courier New',monospace;font-size:11px;border-radius:4px;cursor:pointer">INT</button>
      <button onclick="selectASI('wis')" id="asi-wis" style="padding:8px;background:rgba(192,150,50,0.1);border:1px solid rgba(192,150,50,0.3);color:#f0e6c8;font-family:'Courier New',monospace;font-size:11px;border-radius:4px;cursor:pointer">WIS</button>
      <button onclick="selectASI('cha')" id="asi-cha" style="padding:8px;background:rgba(192,150,50,0.1);border:1px solid rgba(192,150,50,0.3);color:#f0e6c8;font-family:'Courier New',monospace;font-size:11px;border-radius:4px;cursor:pointer">CHA</button>
    </div>
    <div style="margin-top:10px;color:#555;font-size:9px;text-align:center" id="asi-sel-lbl">Select 2 stats</div>
