# Character Vessels (Classes)
# Defines starting stats and mastery multipliers for Soul Cores

vessels:
  - id: fighter
    name: "Fighter"
    description: "Master of steel and physical combat."
    primary_stat: "strength"
    mastery:
      crimson: 1.25
      azure: 1.0
      golden: 1.0
    base_stats:
      str: 16
      dex: 12
      int: 8
      wis: 10
      con: 14

  - id: wizard
    name: "Wizard"
    description: "Scholar of the arcane and soul-essence."
    primary_stat: "intelligence"
    mastery:
      crimson: 1.0
      azure: 1.0
      golden: 1.25
    base_stats:
      str: 8
      dex: 12
      int: 16
      wis: 14
      con: 10

  - id: rogue
    name: "Rogue"
    description: "A shadowy hybrid of speed and precision."
    primary_stat: "dexterity"
    mastery:
      crimson: 1.15
      azure: 1.0
      golden: 1.15
    base_stats:
      str: 10
      dex: 16
      int: 12
      wis: 8
      con: 10

  - id: cleric
    name: "Cleric"
    description: "Devout protector of the Ancient Temple."
    primary_stat: "wisdom"
    mastery:
      crimson: 1.0
      azure: 1.25
      golden: 1.0
    base_stats:
      str: 12
      dex: 8
      int: 10
      wis: 16
      con: 14
