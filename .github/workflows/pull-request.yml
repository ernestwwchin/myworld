name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  check-tofu:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.tofu }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if git diff --name-only origin/main...HEAD -- 'tofu/' | grep -q .; then
            echo "tofu=true" >> "$GITHUB_OUTPUT"
          else
            echo "tofu=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    needs: check-tofu
    if: needs.check-tofu.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: nonprod
    strategy:
      matrix:
        include:
          - stack: shared
            domain: myworld-nonprod.ernestwwchin.com
            cache_ttl: 0
          - stack: nonprod
            domain: myworld-nonprod.ernestwwchin.com
            cache_ttl: 0
          - stack: prod
            domain: myworld.ernestwwchin.com
            cache_ttl: 86400
    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ matrix.domain }}
      TF_VAR_cache_ttl: ${{ matrix.cache_ttl }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1
      - run: tofu init
        working-directory: tofu/${{ matrix.stack }}
      - id: plan
        working-directory: tofu/${{ matrix.stack }}
        run: tofu plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tofu/${{ matrix.stack }}/plan-output.txt', 'utf8');
            const body = `### Tofu Plan — ${{ matrix.stack }}\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
      - if: steps.plan.outcome == 'failure'
        run: exit 1

  plan-result:
    if: always() && github.event.action != 'closed'
    needs: [check-tofu, plan]
    runs-on: ubuntu-latest
    steps:
      - run: |
          [[ "${{ needs.check-tofu.outputs.changed }}" == "false" ]] && exit 0
          [[ "${{ needs.plan.result }}" == "success" ]] && exit 0
          exit 1

  preview:
    needs: test
    runs-on: ubuntu-latest
    environment: nonprod
    if: github.event.action != 'closed'
    env:
      PR_NUM: ${{ github.event.pull_request.number }}
      BUCKET: myworld-nonprod-game-${{ vars.AWS_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-nonprod-deploy
          aws-region: ap-southeast-1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Sync to S3
        run: aws s3 sync dist/ s3://${BUCKET}/pr/${PR_NUM}/ --delete
      - uses: actions/github-script@v7
        env:
          URL: https://myworld-pr-${{ github.event.pull_request.number }}.ernestwwchin.com
        with:
          script: |
            const body = `### PR Preview\n\n**${process.env.URL}**\n\nDeployed at ${new Date().toISOString()}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('PR Preview'));
            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: nonprod
    env:
      PR_NUM: ${{ github.event.pull_request.number }}
      BUCKET: myworld-nonprod-game-${{ vars.AWS_ACCOUNT_ID }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-nonprod-deploy
          aws-region: ap-southeast-1
      - run: aws s3 rm s3://${BUCKET}/pr/${PR_NUM}/ --recursive
