name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      stack:
        description: 'Stack to apply'
        required: true
        type: choice
        options:
          - shared
          - nonprod
          - prod
          - all

concurrency:
  group: infra
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  apply-shared:
    if: inputs.stack == 'shared' || inputs.stack == 'all'
    runs-on: ubuntu-latest
    environment: nonprod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/shared
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/shared
        run: tofu apply -auto-approve

  apply-nonprod:
    needs: apply-shared
    if: always() && (inputs.stack == 'nonprod' || inputs.stack == 'all') && (needs.apply-shared.result == 'success' || needs.apply-shared.result == 'skipped')
    runs-on: ubuntu-latest
    environment: nonprod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/nonprod
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/nonprod
        run: tofu apply -auto-approve

  apply-prod:
    needs: apply-nonprod
    if: always() && (inputs.stack == 'prod' || inputs.stack == 'all') && (needs.apply-nonprod.result == 'success' || needs.apply-nonprod.result == 'skipped')
    runs-on: ubuntu-latest
    environment: prod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/prod
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/prod
        run: tofu apply -auto-approve
