name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'tofu/**'
      - '.github/workflows/infra.yml'

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # --- Apply shared (merge to main) ---
  apply-shared:
    runs-on: ubuntu-latest
    environment: nonprod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/shared
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/shared
        run: tofu apply -auto-approve

  # --- Apply nonprod (after shared) ---
  apply-nonprod:
    needs: apply-shared
    runs-on: ubuntu-latest
    environment: nonprod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/nonprod
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/nonprod
        run: tofu apply -auto-approve

  # --- Apply prod (after nonprod, requires approval) ---
  apply-prod:
    needs: apply-nonprod
    runs-on: ubuntu-latest
    environment: prod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/prod
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/prod
        run: tofu apply -auto-approve
