name: Infra

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to apply
        required: true
        type: choice
        options: [shared, nonprod, prod, all]

concurrency:
  group: infra
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  shared:
    if: contains(fromJSON('["shared","all"]'), inputs.stack)
    uses: ./.github/workflows/_tofu-apply.yml
    with:
      stack: shared
      environment: nonprod

  nonprod:
    needs: shared
    if: always() && contains(fromJSON('["nonprod","all"]'), inputs.stack) && !contains(needs.*.result, 'failure')
    uses: ./.github/workflows/_tofu-apply.yml
    with:
      stack: nonprod
      environment: nonprod

  prod:
    needs: nonprod
    if: always() && contains(fromJSON('["prod","all"]'), inputs.stack) && !contains(needs.*.result, 'failure')
    uses: ./.github/workflows/_tofu-apply.yml
    with:
      stack: prod
      environment: prod
