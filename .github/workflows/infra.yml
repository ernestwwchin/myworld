name: Infrastructure

on:
  pull_request:
    paths:
      - 'tofu/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths:
      - 'tofu/**'
      - '.github/workflows/infra.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ── Plan (PR only) ─────────────────────────────────
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - stack: shared
            env_name: nonprod
          - stack: nonprod
            env_name: nonprod
          - stack: prod
            env_name: prod
    environment: ${{ matrix.env_name }}

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/${{ matrix.stack }}
        run: tofu init

      - name: Tofu Plan
        id: plan
        working-directory: tofu/${{ matrix.stack }}
        run: |
          tofu plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tofu/${{ matrix.stack }}/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncated)'
              : plan;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Tofu Plan — ${{ matrix.stack }}\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Apply shared (merge to main) ───────────────────
  apply-shared:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: nonprod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/shared
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/shared
        run: tofu apply -auto-approve

  # ── Apply nonprod (after shared) ───────────────────
  apply-nonprod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: apply-shared
    runs-on: ubuntu-latest
    environment: nonprod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/nonprod
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/nonprod
        run: tofu apply -auto-approve

  # ── Apply prod (after nonprod, requires approval) ──
  apply-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: apply-nonprod
    runs-on: ubuntu-latest
    environment: prod

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/prod
        run: tofu init

      - name: Tofu Apply
        working-directory: tofu/prod
        run: tofu apply -auto-approve
