name: PR Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: nonprod
    env:
      PR_NUM: ${{ github.event.pull_request.number }}
      BUCKET: myworld-nonprod-game-${{ vars.AWS_ACCOUNT_ID }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-nonprod-deploy
          aws-region: ap-southeast-1

      - name: Delete PR preview files from S3
        run: |
          aws s3 rm s3://${BUCKET}/pr/${PR_NUM}/ --recursive
          echo "Cleaned up PR #${PR_NUM} preview files"
