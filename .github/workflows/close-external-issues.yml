name: Close External Issues

on:
  issues:
    types: [opened]

jobs:
  close-if-external:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issue from non-collaborators
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.repos.checkCollaborator({
                owner,
                repo,
                username: issue.user.login,
              });
              console.log(`${issue.user.login} is a collaborator — allowing issue.`);
            } catch {
              console.log(`${issue.user.login} is NOT a collaborator — closing issue.`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'Thank you for your interest, but this repository does not accept external contributions. This issue has been automatically closed.',
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
