name: Close External PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  close-if-external:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Close PR from non-collaborators
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if PR author is a collaborator
            try {
              await github.rest.repos.checkCollaborator({
                owner,
                repo,
                username: pr.user.login,
              });
              console.log(`${pr.user.login} is a collaborator — allowing PR.`);
            } catch {
              console.log(`${pr.user.login} is NOT a collaborator — closing PR.`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: 'Thank you for your interest, but this repository does not accept external contributions. This PR has been automatically closed.',
              });
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: 'closed',
              });
            }
