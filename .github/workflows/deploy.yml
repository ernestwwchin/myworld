name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-nonprod:
    runs-on: ubuntu-latest
    environment: nonprod

    env:
      ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-nonprod-deploy
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://myworld-nonprod-game-${ACCOUNT_ID}/ \
            --exclude "*" \
            --include "index.html" \
            --include "js/*" \
            --include "assets/*" \
            --include "data/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='myworld nonprod'].Id" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"

  deploy-prod:
    needs: deploy-nonprod
    runs-on: ubuntu-latest
    environment: prod

    env:
      ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-prod-deploy
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://myworld-prod-game-${ACCOUNT_ID}/ \
            --exclude "*" \
            --include "index.html" \
            --include "js/*" \
            --include "assets/*" \
            --include "data/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='myworld prod'].Id" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
