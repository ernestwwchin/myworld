name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e

  check-tofu:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.tofu }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for tofu changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'tofu/' || true)
          if [ -n "$CHANGED" ]; then
            echo "tofu=true" >> "$GITHUB_OUTPUT"
          else
            echo "tofu=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    needs: check-tofu
    if: needs.check-tofu.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - stack: shared
            env_name: nonprod
          - stack: nonprod
            env_name: nonprod
          - stack: prod
            env_name: prod
    environment: ${{ matrix.env_name }}

    env:
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN }}
      TF_VAR_cache_ttl: ${{ vars.CACHE_TTL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/myworld-infra
          aws-region: ap-southeast-1

      - name: Tofu Init
        working-directory: tofu/${{ matrix.stack }}
        run: tofu init

      - name: Tofu Plan
        id: plan
        working-directory: tofu/${{ matrix.stack }}
        run: |
          tofu plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tofu/${{ matrix.stack }}/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncated)'
              : plan;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Tofu Plan - ${{ matrix.stack }}\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # --- Gate job: always runs, passes if plan skipped or succeeded ---
  plan-result:
    if: always()
    needs: [check-tofu, plan]
    runs-on: ubuntu-latest
    steps:
      - name: Check plan outcome
        run: |
          if [ "${{ needs.check-tofu.outputs.changed }}" = "false" ]; then
            echo "No tofu changes — plan skipped, OK"
            exit 0
          fi
          if [ "${{ needs.plan.result }}" = "success" ]; then
            echo "Plan succeeded"
            exit 0
          fi
          echo "Plan failed"
          exit 1
